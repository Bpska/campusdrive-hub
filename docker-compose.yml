version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campusdrive-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bps}
      POSTGRES_DB: campusdrive_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Exposed to local host for convenience, secure with firewall in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campusdrive_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusdrive-backend
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-bps}@db:5432/campusdrive_hub
      JWT_SECRET: ${JWT_SECRET:-admitflow_secure_jwt_secret_key_2026}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campusdrive-frontend
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production


  nginx:
    image: nginx:alpine
    container_name: campusdrive-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: campusdrive-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit 0 SIGTERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
    driver: local
  certbot-etc:
  certbot-var:
  webroot:
